name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: '9.x'
      - name: Restore dependencies
        run: dotnet restore
      - name: Build the project
        run: dotnet build --configuration Release
      - name: Run tests
        run: dotnet test --configuration Release
